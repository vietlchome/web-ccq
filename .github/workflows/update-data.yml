name: Cập nhật NAV hàng ngày

on:
  schedule:
    # 12:30 UTC = 19:30 giờ VN — chạy MỖI NGÀY (gồm T7/CN) để BTC (24/7) luôn cập nhật.
    # NAV quỹ & vàng không đổi cuối tuần → chỉ commit khi có thay đổi nên không tốn kém.
    - cron: "30 12 * * *"
  workflow_dispatch: {}   # cho phép chạy tay từ tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài dependencies
        run: pip install requests

      - name: Tải NAV từ Fmarket
        run: python fetch_data.py

      - name: Commit dữ liệu mới
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Cập nhật NAV $(date -u +%Y-%m-%d)"
          git push
